name: Release Desktop Apps

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Release Windows Build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run backend smoke test
        run: npm test
        working-directory: backend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build Windows installer
        run: npm run build:win
        working-directory: electron

      - name: Smoke test packaged Windows app
        run: node scripts/electron-smoke.mjs "dist/win-unpacked/QuartoReview.exe"

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $installer = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found." }
          Copy-Item $installer.FullName release-assets/QuartoReview-Windows.exe
          $blockmap = Get-ChildItem dist -Filter *.blockmap | Select-Object -First 1
          if ($blockmap) { Copy-Item $blockmap.FullName release-assets/QuartoReview-Windows.exe.blockmap }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/*
          if-no-files-found: error

  build-macos:
    name: Release macOS Build
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run backend smoke test
        run: npm test
        working-directory: backend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build macOS app
        run: npm run build:mac
        working-directory: electron

      - name: Smoke test packaged macOS app
        shell: bash
        run: |
          APP_PATH="$(find dist -path '*QuartoReview.app/Contents/MacOS/QuartoReview' | head -n 1)"
          test -n "$APP_PATH"
          node scripts/electron-smoke.mjs "$APP_PATH"

      - name: Prepare macOS release assets
        shell: bash
        run: |
          mkdir -p release-assets
          dmg="$(find dist -maxdepth 1 -name '*.dmg' | head -n 1)"
          zip="$(find dist -maxdepth 1 -name '*.zip' | head -n 1)"
          test -n "$dmg"
          test -n "$zip"
          cp "$dmg" release-assets/QuartoReview-macOS.dmg
          cp "$zip" release-assets/QuartoReview-macOS.zip

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/*
            release-assets/macos/*
          generate_release_notes: true
